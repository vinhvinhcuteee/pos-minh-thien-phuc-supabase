name: Backup Supabase

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          
      - name: Backup database
        run: |
          TIMESTAMP=$(date +'%Y%m%d_%H%M%S')
          echo "TIMESTAMP=$TIMESTAMP" >> $GITHUB_ENV
          
          # Dùng trực tiếp URL
          pg_dump "${{ secrets.SUPABASE_DB_URL }}" > "backup_${TIMESTAMP}.sql"
          
          # Nén file
          gzip "backup_${TIMESTAMP}.sql"
          
          # Hiển thị dung lượng
          ls -lh "backup_${TIMESTAMP}.sql.gz"
          
      - name: Upload backup to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ env.TIMESTAMP }}
          path: backup_*.sql.gz
          retention-days: 30
