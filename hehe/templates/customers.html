<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý khách hàng - CỬA HÀNG MINH THIÊN PHÚC</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f3f4f6;
        }
        
        .header {
            background: #3b82f6;
            color: white;
            padding: 16px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header h1 {
            font-size: 1.1rem;
            text-align: center;
        }
        
        .nav-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        
        .nav-links a {
            color: #9ca3af;
            text-decoration: none;
            padding: 6px 12px;
            font-size: 0.85rem;
        }
        
        .nav-links a:hover {
            color: white;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .btn-add {
            background: #10b981;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
        }
        
        .customers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 16px;
            margin-bottom: 30px;
        }
        
        .customer-card {
            background: white;
            border-radius: 8px;
            padding: 16px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            border: 1px solid #e5e7eb;
        }
        
        .customer-name {
            font-size: 1rem;
            font-weight: bold;
            color: #1f2937;
            margin-bottom: 8px;
        }
        
        .customer-info {
            font-size: 0.8rem;
            color: #6b7280;
            margin-bottom: 6px;
        }
        
        .customer-spent {
            font-size: 0.9rem;
            color: #dc2626;
            font-weight: bold;
            margin-top: 8px;
        }
        
        .customer-actions {
            margin-top: 12px;
            display: flex;
            gap: 8px;
        }
        
        .btn-edit, .btn-delete, .btn-history {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        
        .btn-edit {
            background: #3b82f6;
            color: white;
        }
        
        .btn-delete {
            background: #ef4444;
            color: white;
        }
        
        .btn-history {
            background: #6b7280;
            color: white;
        }
        
        .history-panel {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            display: none;
        }
        
        .history-panel.active {
            display: block;
        }
        
        .history-title {
            font-size: 1rem;
            font-weight: bold;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 2px solid #1f2937;
        }
        
        .history-list {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .history-item {
            padding: 12px;
            border-bottom: 1px solid #e5e7eb;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 24px;
            max-width: 500px;
            width: 100%;
        }
        
        .modal-content h2 {
            margin-bottom: 20px;
            color: #1f2937;
        }
        
        .modal-content input, .modal-content textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 12px;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            font-size: 1rem;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .modal-buttons button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        
        .btn-save {
            background: #10b981;
            color: white;
        }
        
        .btn-cancel {
            background: #6b7280;
            color: white;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #9ca3af;
        }
        
        .logout-btn {
            background: #dc2626;
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.8rem;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>QUẢN LÝ KHÁCH HÀNG</h1>
        <div class="nav-links">
            <a href="/">BÁN HÀNG</a>
            <a href="/products">SẢN PHẨM</a>
            <a href="/customers">KHÁCH HÀNG</a>
            <a href="/reports">BÁO CÁO</a>
            <a href="/invoices">HÓA ĐƠN</a>
            <a href="/logout" class="logout-btn">ĐĂNG XUẤT</a>
        </div>
    </div>
    
    <div class="container">
        <button class="btn-add" onclick="openAddModal()">+ THÊM KHÁCH HÀNG</button>
        
        <div class="customers-grid" id="customersGrid">
            <div class="empty-state">Đang tải...</div>
        </div>
        
        <div id="historyPanel" class="history-panel">
            <div class="history-title" id="historyTitle">LỊCH SỬ MUA HÀNG</div>
            <div id="historyList" class="history-list"></div>
        </div>
    </div>
    
    <!-- Modal thêm/sửa khách hàng -->
    <div id="customerModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">THÊM KHÁCH HÀNG</h2>
            <input type="hidden" id="customerId">
            <input type="text" id="customerName" placeholder="Tên khách hàng" required>
            <input type="tel" id="customerPhone" placeholder="Số điện thoại">
            <input type="email" id="customerEmail" placeholder="Email">
            <textarea id="customerAddress" rows="3" placeholder="Địa chỉ"></textarea>
            <div class="modal-buttons">
                <button class="btn-save" onclick="saveCustomer()">LƯU</button>
                <button class="btn-cancel" onclick="closeModal()">HỦY</button>
            </div>
        </div>
    </div>
    
    <script>
        let currentCustomerId = null;
        let currentEditId = null;
        
        async function loadCustomers() {
            const res = await fetch('/api/customers');
            const customers = await res.json();
            const grid = document.getElementById('customersGrid');
            
            if (customers.length === 0) {
                grid.innerHTML = '<div class="empty-state">Chưa có khách hàng nào</div>';
                return;
            }
            
            grid.innerHTML = customers.map(c => `
                <div class="customer-card">
                    <div class="customer-name">${escapeHtml(c.name)}</div>
                    <div class="customer-info">
                        ${c.phone ? `📞 ${c.phone}` : ''}
                        ${c.email ? `✉️ ${c.email}` : ''}
                    </div>
                    <div class="customer-info">
                        ${c.address ? `📍 ${escapeHtml(c.address)}` : ''}
                    </div>
                    <div class="customer-spent">💰 Đã mua: ${formatMoney(c.total_spent || 0)}</div>
                    ${c.last_purchase ? `<div class="customer-info">🕐 Lần cuối: ${new Date(c.last_purchase).toLocaleDateString('vi-VN')}</div>` : ''}
                    <div class="customer-actions">
                        <button class="btn-history" onclick="showHistory(${c.id}, '${escapeHtml(c.name)}')">LỊCH SỬ</button>
                        <button class="btn-edit" onclick="editCustomer(${c.id})">SỬA</button>
                        <button class="btn-delete" onclick="deleteCustomer(${c.id})">XÓA</button>
                    </div>
                </div>
            `).join('');
        }
        
        async function showHistory(customerId, customerName) {
            currentCustomerId = customerId;
            document.getElementById('historyTitle').innerHTML = `LỊCH SỬ MUA HÀNG - ${escapeHtml(customerName)}`;
            document.getElementById('historyPanel').classList.add('active');
            
            const res = await fetch(`/api/customers/${customerId}/history`);
            const orders = await res.json();
            const historyList = document.getElementById('historyList');
            
            if (orders.length === 0) {
                historyList.innerHTML = '<div class="empty-state">Chưa có đơn hàng nào</div>';
                return;
            }
            
            const groupedOrders = {};
            orders.forEach(item => {
                if (!groupedOrders[item.order_id]) {
                    groupedOrders[item.order_id] = {
                        order_number: item.order_number,
                        total_amount: item.total_amount,
                        created_at: item.created_at,
                        payment_method: item.payment_method,
                        items: []
                    };
                }
                groupedOrders[item.order_id].items.push({
                    product_name: item.product_name,
                    quantity: item.quantity,
                    price: item.price
                });
            });
            
            historyList.innerHTML = Object.values(groupedOrders).map(order => `
                <div class="history-item">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                        <strong style="color: #1f2937;">${order.order_number}</strong>
                        <strong style="color: #dc2626;">${formatMoney(order.total_amount)}</strong>
                    </div>
                    <div style="font-size: 0.75rem; color: #6b7280; margin-bottom: 8px;">
                        🕐 ${new Date(order.created_at).toLocaleString('vi-VN')} | 💳 ${order.payment_method === 'cash' ? 'Tiền mặt' : 'Chuyển khoản'}
                    </div>
                    <div style="font-size: 0.8rem; margin-top: 8px;">
                        ${order.items.map(item => `
                            <div>📦 ${escapeHtml(item.product_name)} x ${item.quantity} = ${formatMoney(item.price * item.quantity)}</div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }
        
        function openAddModal() {
            document.getElementById('modalTitle').innerText = 'THÊM KHÁCH HÀNG';
            document.getElementById('customerId').value = '';
            document.getElementById('customerName').value = '';
            document.getElementById('customerPhone').value = '';
            document.getElementById('customerEmail').value = '';
            document.getElementById('customerAddress').value = '';
            document.getElementById('customerModal').classList.add('active');
        }
        
        async function editCustomer(id) {
            const res = await fetch('/api/customers');
            const customers = await res.json();
            const customer = customers.find(c => c.id === id);
            
            if (customer) {
                document.getElementById('modalTitle').innerText = 'SỬA KHÁCH HÀNG';
                document.getElementById('customerId').value = customer.id;
                document.getElementById('customerName').value = customer.name;
                document.getElementById('customerPhone').value = customer.phone || '';
                document.getElementById('customerEmail').value = customer.email || '';
                document.getElementById('customerAddress').value = customer.address || '';
                document.getElementById('customerModal').classList.add('active');
            }
        }
        
        async function saveCustomer() {
            const id = document.getElementById('customerId').value;
            const data = {
                name: document.getElementById('customerName').value,
                phone: document.getElementById('customerPhone').value,
                email: document.getElementById('customerEmail').value,
                address: document.getElementById('customerAddress').value
            };
            
            if (!data.name) {
                alert('Vui lòng nhập tên khách hàng!');
                return;
            }
            
            const url = id ? `/api/customers/${id}` : '/api/customers';
            const method = id ? 'PUT' : 'POST';
            
            const res = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            
            if (res.ok) {
                alert(id ? 'Cập nhật thành công!' : 'Thêm khách hàng thành công!');
                closeModal();
                loadCustomers();
            } else {
                const error = await res.json();
                alert(error.error || 'Có lỗi xảy ra!');
            }
        }
        
        async function deleteCustomer(id) {
            if (confirm('Xóa khách hàng sẽ xóa toàn bộ lịch sử mua hàng? Bạn có chắc?')) {
                const res = await fetch(`/api/customers/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    alert('Xóa thành công!');
                    loadCustomers();
                    document.getElementById('historyPanel').classList.remove('active');
                } else {
                    const error = await res.json();
                    alert(error.error || 'Xóa thất bại!');
                }
            }
        }
        
        function closeModal() {
            document.getElementById('customerModal').classList.remove('active');
        }
        
        function formatMoney(amount) {
            return new Intl.NumberFormat('vi-VN').format(amount) + 'đ';
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        loadCustomers();
    </script>
</body>
</html>
