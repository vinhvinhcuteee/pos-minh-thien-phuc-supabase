<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hóa đơn - CỬA HÀNG MINH THIÊN PHÚC</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f3f4f6; }
        .header { background: #3b82f6; color: white; padding: 16px; }
        .header h1 { font-size: 1.1rem; text-align: center; }
        .nav-links { display: flex; justify-content: center; gap: 20px; margin-top: 12px; flex-wrap: wrap; }
        .nav-links a { color: #e0e7ff; text-decoration: none; padding: 6px 12px; font-size: 0.85rem; }
        .nav-links a:hover { color: white; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        .filter-bar { background: white; padding: 16px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .filter-bar select, .filter-bar input { padding: 8px 12px; border: 1px solid #e5e7eb; border-radius: 6px; }
        .filter-bar button { padding: 8px 16px; background: #3b82f6; color: white; border: none; border-radius: 6px; cursor: pointer; }
        .invoices-table { background: white; border-radius: 8px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e5e7eb; }
        th { background: #f9fafb; font-weight: 600; }
        .btn-delete { background: #ef4444; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
        .btn-delete:hover { background: #dc2626; }
        .empty-state { text-align: center; padding: 40px; color: #9ca3af; }
        .logout-btn { background: #dc2626; color: white; padding: 6px 12px; border-radius: 6px; text-decoration: none; margin-left: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>HÓA ĐƠN BÁN HÀNG</h1>
        <div class="nav-links">
            <a href="/">BÁN HÀNG</a>
            <a href="/products">SẢN PHẨM</a>
            <a href="/customers">KHÁCH HÀNG</a>
            <a href="/reports">BÁO CÁO</a>
            <a href="/invoices">HÓA ĐƠN</a>
            <a href="/logout" class="logout-btn">ĐĂNG XUẤT</a>
        </div>
    </div>
    
    <div class="container">
        <div class="filter-bar">
            <label>LỌC THEO:</label>
            <select id="filterType" onchange="loadInvoices()">
                <option value="all">TẤT CẢ</option>
                <option value="today">HÔM NAY</option>
                <option value="week">TUẦN NÀY</option>
                <option value="month">THÁNG NÀY</option>
            </select>
            <label>TỪ NGÀY:</label>
            <input type="date" id="startDate" onchange="loadInvoices()">
            <label>ĐẾN NGÀY:</label>
            <input type="date" id="endDate" onchange="loadInvoices()">
            <button onclick="printInvoices()">IN HÓA ĐƠN</button>
        </div>
        
        <div class="invoices-table">
            <table id="invoicesTable">
                <thead>
                    <tr>
                        <th>MÃ ĐƠN</th>
                        <th>SẢN PHẨM</th>
                        <th>NGÀY MUA</th>
                        <th>SỐ LƯỢNG</th>
                        <th>ĐƠN GIÁ</th>
                        <th>THÀNH TIỀN</th>
                        <th>THAO TÁC</th>
                    </tr>
                </thead>
                <tbody id="invoiceList">
                    <tr><td colspan="7" class="empty-state">Đang tải...</td></tr>
                </tbody>
                <tfoot>
                    <tr><td colspan="6"><strong>TỔNG CỘNG:</strong></td><td id="totalAmount"><strong>0đ</strong></td></tr>
                </tfoot>
            </table>
        </div>
    </div>
    
    <script>
        async function loadInvoices() {
            const filterType = document.getElementById('filterType').value;
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            
            let url = `/api/invoices?filter=${filterType}`;
            if (startDate) url += `&start_date=${startDate}`;
            if (endDate) url += `&end_date=${endDate}`;
            
            try {
                const res = await fetch(url);
                const invoices = await res.json();
                const tbody = document.getElementById('invoiceList');
                const totalSpan = document.getElementById('totalAmount');
                
                console.log('Dữ liệu nhận được:', invoices);
                
                if (!invoices || invoices.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" class="empty-state">Không có hóa đơn nào</td></tr>';
                    totalSpan.innerHTML = '<strong>0đ</strong>';
                    return;
                }
                
                let totalAll = 0;
                let html = '';
                
                for (const inv of invoices) {
                    const subtotal = (inv.quantity || 0) * (inv.price || 0);
                    totalAll += subtotal;
                    const date = new Date(inv.created_at);
                    const dateStr = date.toLocaleString('vi-VN');
                    
                    html += `
                        <tr>
                            <td>${escapeHtml(inv.order_number || '')}</td>
                            <td>${escapeHtml(inv.product_name || '')}</td>
                            <td>${dateStr}</td>
                            <td>${inv.quantity || 0}</td>
                            <td>${formatMoney(inv.price || 0)}</td>
                            <td>${formatMoney(subtotal)}</td>
                            <td><button class="btn-delete" onclick="deleteInvoice('${escapeHtml(inv.order_number)}')">XÓA</button></td>
                        </tr>
                    `;
                }
                
                tbody.innerHTML = html;
                totalSpan.innerHTML = `<strong>${formatMoney(totalAll)}</strong>`;
            } catch(e) {
                console.error('Lỗi loadInvoices:', e);
                document.getElementById('invoiceList').innerHTML = '<tr><td colspan="7" class="empty-state">Lỗi tải dữ liệu: ' + e.message + '</td></tr>';
            }
        }
        
        async function deleteInvoice(orderNumber) {
            if (!confirm(`Bạn có chắc muốn xóa hóa đơn ${orderNumber}?`)) return;
            
            try {
                const res = await fetch(`/api/invoices/${orderNumber}`, { method: 'DELETE' });
                const result = await res.json();
                
                if (result.success) {
                    alert('Xóa thành công!');
                    loadInvoices();
                } else {
                    alert('Lỗi: ' + (result.error || 'Không thể xóa'));
                }
            } catch(e) {
                alert('Lỗi: ' + e.message);
            }
        }
        
        function printInvoices() {
            window.print();
        }
        
        function formatMoney(amount) {
            if (amount >= 1000000) return (amount / 1000000).toFixed(1) + 'trđ';
            return new Intl.NumberFormat('vi-VN').format(amount) + 'đ';
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Set default dates (đầu tháng đến hôm nay)
        const today = new Date();
        const firstDay = new Date(today.getFullYear(), today.getMonth(), 1);
        document.getElementById('startDate').value = firstDay.toISOString().split('T')[0];
        document.getElementById('endDate').value = today.toISOString().split('T')[0];
        
        loadInvoices();
    </script>
</body>
</html>
